<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA World Cup 2026 Fan Assistant</title>
  <meta name="description" content="Multilingual, accessibility-first navigation and crowd-safety assistant for FIFA World Cup 2026 fans." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <a class="skip-link" href="#composer-input">Skip to message box</a>

  <header class="topbar">
    <div>
      <p class="eyebrow">FIFA World Cup 2026</p>
      <h1 class="brand">Fan Assistant</h1>
    </div>
    <div style="display:flex; align-items:center; gap:0.6rem;">
      <label class="visually-hidden" for="venue-select">Select your venue</label>
      <select id="venue-select" class="venue-select" aria-label="Select your venue"></select>
      <span id="mode-badge" class="mode-badge" data-mode="fallback" role="status">starting…</span>
    </div>
  </header>

  <section aria-label="Live gate status" id="status-strip" class="status-strip"></section>

  <main id="main-content">
    <h2 class="visually-hidden">Conversation with the Fan Assistant</h2>
    <div id="chat-log" class="chat-log" role="log" aria-live="polite" aria-relevant="additions"></div>

    <div class="quick-actions" role="group" aria-label="Quick questions">
      <button class="quick-action" data-prompt="Which gate has the shortest wait right now?">Least crowded gate</button>
      <button class="quick-action" data-prompt="I use a wheelchair, what is the best accessible route in?">Accessible route</button>
      <button class="quick-action" data-prompt="What are my transport and parking options?">Transport options</button>
      <button class="quick-action" data-prompt="What is the most sustainable way to get to the stadium?">Sustainability tip</button>
    </div>

    <form id="composer" class="composer">
      <label class="visually-hidden" for="composer-input">Type your message to the Fan Assistant, in any language</label>
      <textarea id="composer-input" placeholder="Ask in any language: gates, crowds, transport, accessibility…" rows="1" maxlength="2000"></textarea>
      <button type="submit" id="send-btn" class="send-btn">Send</button>
    </form>

    <div class="accessibility-bar">
      <span>Display:</span>
      <button id="toggle-contrast" type="button" aria-pressed="false">High contrast</button>
      <button id="toggle-text-size" type="button" aria-pressed="false">Large text</button>
      <span style="flex:1"></span>
      <a href="/ops.html">Staff / volunteer view →</a>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
